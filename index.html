<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Aakshi 💫</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Great+Vibes&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #2a001a, #14001a, #000814);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Fixed Top Handle */
        .instagram-handle {
            position: absolute;
            top: 15px;
            width: 100%;
            font-weight: 400;
            color: rgba(255, 204, 221, 0.8);
            z-index: 1000;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .top-handle {
            position: absolute;
            top: 45px;
            width: 100%;
            font-weight: 600;
            color: #ffccdd;
            text-shadow: 0 0 12px #ff69b4;
            z-index: 100;
            font-size: 1.1rem;
            letter-spacing: 2.5px;
        }

        .page {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .page.active {
            opacity: 1;
            visibility: visible;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.2rem;
            margin-bottom: 20px;
            color: #ffccdd;
            text-shadow: 0 0 15px #ff69b4;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.5;
            max-width: 85%;
            color: #f5e1e9;
        }

        .gif-container {
            width: 200px;
            height: 200px;
            margin-bottom: 25px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #ff99cc;
            box-shadow: 0 0 20px rgba(255,105,180,0.3);
        }

        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            background: linear-gradient(135deg, #ff6699, #ff3366);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            margin: 8px;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(255,51,102,0.3);
        }

        .btn:active { transform: scale(0.95); }

        .btn.no-btn {
            background: linear-gradient(135deg, #6c757d, #495057);
        }

        #yes-container {
            width: 100%;
            max-height: 40vh;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 10px;
        }

        /* Optimized Animations */
        #bg-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .heart, .star, .petal {
            position: absolute;
            will-change: transform;
        }

        .heart {
            bottom: -50px;
            animation: rise linear infinite;
        }

        @keyframes rise {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        .star {
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: 0.3; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="instagram-handle">Follow on Insta: @smss1708 💗</div>
    <div class="top-handle">Made for Aakshi 🌸</div>

    <audio id="bg-music" loop>
        <source src="tere-liye.mp3" type="audio/mpeg">
    </audio>

    <div id="bg-container"></div>

    <div class="page active" id="page-1">
        <h1>Hi Aakshi! ✨</h1>
        <p>Ek chota sa surprise tumhare liye...</p>
        <button class="btn" onclick="nextPage(1)">Click Here</button>
    </div>

    <div class="page" id="page-2">
        <div class="gif-container">
            <img src="flower1.gif" alt="Flower 1">
        </div>
        <p>It was really nice meeting you today! 🌸</p>
        <button class="btn" onclick="nextPage(2)">Next</button>
    </div>

    <div class="page" id="page-3">
        <div class="gif-container">
            <img src="flower2.gif" alt="Flower 2">
        </div>
        <p>I hope your day was as awesome as your vibe. 🌷</p>
        <button class="btn" onclick="nextPage(3)">One more</button>
    </div>

    <div class="page" id="page-4">
        <div class="gif-container">
            <img src="flower3.gif" alt="Flower 3">
        </div>
        <h1>Aakshi ab se ham frnds?</h1>
        <div id="yes-container">
            <button class="btn" id="yes-main" onclick="sayYes()">Yes 😊</button>
            <button class="btn no-btn" id="no-btn" onclick="noThanks()">No 😔</button>
        </div>
    </div>

    <div class="page" id="page-5">
        <h1>nice to meet you aakshi have a nice day</h1>
        <p>🌙✨</p>
    </div>

    <script>
        const bgMusic = document.getElementById('bg-music');
        const yesContainer = document.getElementById('yes-container');
        let yesButtonsCount = 1;

        function nextPage(current) {
            if (current === 1) {
                bgMusic.play().catch(() => console.log("Audio play blocked"));
            }
            document.getElementById(`page-${current}`).classList.remove('active');
            setTimeout(() => {
                document.getElementById(`page-${current + 1}`).classList.add('active');
            }, 300);
        }

        function sayYes() {
            document.getElementById('page-4').classList.remove('active');
            setTimeout(() => document.getElementById('page-5').classList.add('active'), 300);
        }

        function noThanks() {
            // Fix: Add buttons incrementally to prevent lag
            for (let i = 0; i < 5; i++) {
                const y = document.createElement('button');
                y.className = 'btn';
                y.textContent = 'Yes 😊';
                y.onclick = sayYes;
                yesContainer.insertBefore(y, document.getElementById('no-btn'));
            }
        }

        function createBackground() {
            const container = document.getElementById('bg-container');
            const icons = ['💖','✨','🌸'];

            // Optimized: Create fewer, higher quality elements
            for (let i = 0; i < 15; i++) {
                const h = document.createElement('div');
                h.className = 'heart';
                h.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                h.style.left = Math.random() * 90 + 'vw';
                h.style.fontSize = (Math.random() * 15 + 15) + 'px';
                h.style.animationDuration = (Math.random() * 5 + 5) + 's';
                h.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(h);
            }

            for (let i = 0; i < 20; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 3 + 1;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.top = Math.random() * 100 + 'vh';
                s.style.animationDelay = (Math.random() * 2) + 's';
                container.appendChild(s);
            }
        }
        
        window.onload = createBackground;
    </script>
</body>
</html>
