<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Cutee ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-glow: 0 0 10px #ff69b4, 0 0 20px #ff1493;
            --main-pink: #ff1493;
            --soft-pink: #fff0f5;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Poppins', sans-serif; background: #fff; overflow: hidden; }

        .insta-banner {
            position: fixed; top: 0; width: 100%; text-align: center; padding: 12px;
            background: rgba(255, 255, 255, 0.9); z-index: 1000; font-weight: 600;
            color: var(--main-pink); border-bottom: 1px solid var(--soft-pink);
        }

        section {
            width: 100%; height: 100vh; display: none; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
            background: radial-gradient(circle, #ffffff 0%, #fffafa 100%);
            position: relative; overflow: hidden;
        }

        section.active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Animation Styles */
        .glowing-text {
            color: var(--main-pink); text-shadow: var(--pink-glow);
            font-family: 'Dancing Script', cursive; font-size: 1.5rem;
            margin: 10px 0; opacity: 0; transform: scale(0.9); transition: 0.6s all;
        }
        .show-msg { opacity: 1; transform: scale(1); }

        /* Chat & Line Container */
        .chat-container { width: 100%; height: 80vh; position: relative; margin-top: 50px; }
        #canvas-lines { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        .bubble {
            background: white; padding: 10px 15px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--soft-pink);
            position: absolute; z-index: 2; font-size: 0.9rem; max-width: 70%;
            color: #444; opacity: 0; transition: 0.5s;
        }

        .dot {
            width: 12px; height: 12px; background: var(--main-pink);
            border-radius: 50%; box-shadow: var(--pink-glow);
            position: absolute; z-index: 3; opacity: 0; transform: scale(0);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-love {
            padding: 12px 40px; background: linear-gradient(45deg, #ff69b4, #ff1493);
            color: white; border: none; border-radius: 30px; font-weight: 600;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4); cursor: pointer; z-index: 100;
        }

        /* Scratch Card */
        #scratch-card { position: relative; width: 280px; height: 180px; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #canvas-scratch { position: absolute; top: 0; left: 0; z-index: 2; }
        .hidden-content { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: white; z-index: 1; }

        .intro-gif { width: 200px; border-radius: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="insta-banner">follow on insta - @smss1708</div>
    <audio id="bgMusic" loop><source src="tere-liye.mp3" type="audio/mpeg"></audio>

    <section id="p1" class="active">
        <img src="gif1.gif" class="intro-gif">
        <h2 class="glowing-text show-msg">hii cutee i want to say something</h2>
        <button class="btn-love" onclick="startApp()">Continue ❤️</button>
    </section>

    <section id="p2">
        <canvas id="canvas-lines"></canvas>
        <div class="chat-container" id="chat-box">
            </div>
        <button class="btn-love" id="btnNext" style="display:none; position: absolute; bottom: 30px;" onclick="nextPage(2,3)">Continue ❤️</button>
    </section>

    <section id="p3">
        <h2 class="glowing-text show-msg">Love Compatibility</h2>
        <div style="font-size: 5rem; font-weight: bold; color: var(--main-pink); text-shadow: var(--pink-glow);">100%</div>
        <p class="glowing-text show-msg">Perfect Match 💖</p>
        <button class="btn-love" onclick="nextPage(3,4)">Continue ❤️</button>
    </section>

    <section id="p4">
        <div style="background: white; padding: 30px; border-radius: 20px; border: 2px solid var(--soft-pink); box-shadow: 0 10px 20px var(--soft-pink);">
            <div style="font-size: 3rem;">🌙</div>
            <p class="glowing-text show-msg">I promise to be your peace when life feels too loud.</p>
        </div>
        <button class="btn-love" onclick="nextPage(4,5)">Surprise 🎁</button>
    </section>

    <section id="p5">
        <h2 class="glowing-text show-msg">Scratch Gently ❤️</h2>
        <div id="scratch-card">
            <div class="hidden-content">
                <p class="glowing-text show-msg">I Love You So Much! ❤️<br>@smss1708</p>
            </div>
            <canvas id="canvas-scratch" width="280" height="180"></canvas>
        </div>
        <button class="btn-love" style="margin-top:30px;" onclick="location.reload()">Replay ✨</button>
    </section>

    <script>
        const shairi = [
            "Tum bologi dhimi aavaz me", "fir bhi bat pakad lunga",
            "gale nhi lagaunga tumko", "bus hath pakad lunga",
            "aur is thodi si mohabbat ki aag me", "jindgi bhar jana hai",
            "hotel me nhi jana mujhko", "sadak pe sath chalna hai",
            "fir bhi is duniya se nikal ke mujhme kho sakti ho kya",
            "jyada ki chah nhi mujhko thodi di meri ho sakti ho kya💯"
        ];

        function startApp() {
            document.getElementById('bgMusic').play();
            nextPage(1, 2);
            initShairiAnimation();
        }

        function nextPage(curr, next) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById('p' + next).classList.add('active');
            if(next === 5) initScratch();
        }

        function initShairiAnimation() {
            const container = document.getElementById('chat-box');
            const canvas = document.getElementById('canvas-lines');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ctx = canvas.getContext('2d');
            ctx.strokeStyle = '#ff1493';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);

            let i = 0;
            let lastX, lastY;

            function step() {
                if (i >= shairi.length) {
                    document.getElementById('btnNext').style.display = 'block';
                    return;
                }

                // Calculate Position
                const side = i % 2 === 0 ? 'left' : 'right';
                const yPos = 50 + (i * 70);
                const xPos = side === 'left' ? 20 : window.innerWidth - 180;

                // Create Bubble
                const b = document.createElement('div');
                b.className = 'bubble';
                b.style.top = yPos + 'px';
                b.style[side] = '20px';
                b.innerText = shairi[i];
                container.appendChild(b);

                // Create Dot
                const d = document.createElement('div');
                d.className = 'dot';
                const dotX = side === 'left' ? xPos + 150 : xPos - 20;
                const dotY = yPos + 20;
                d.style.left = dotX + 'px';
                d.style.top = dotY + 'px';
                container.appendChild(d);

                setTimeout(() => {
                    b.style.opacity = '1';
                    d.style.opacity = '1';
                    d.style.transform = 'scale(1)';
                    
                    // Draw Line
                    if (i > 0) {
                        ctx.beginPath();
                        ctx.moveTo(lastX, lastY);
                        ctx.lineTo(dotX + 6, dotY + 6);
                        ctx.stroke();
                    }
                    lastX = dotX + 6;
                    lastY = dotY + 6;
                    i++;
                    setTimeout(step, 1000);
                }, 500);
            }
            step();
        }

        function initScratch() {
            const canvas = document.getElementById('canvas-scratch');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffc0cb';
            ctx.fillRect(0, 0, 280, 180);
            ctx.fillStyle = '#ff1493';
            ctx.font = "bold 16px Arial";
            ctx.textAlign = "center";
            ctx.fillText("SCRATCH WITH LOVE ❤️", 140, 95);

            let drawing = false;
            const scratch = (e) => {
                if(!drawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI*2); ctx.fill();
            };
            canvas.onmousedown = canvas.ontouchstart = () => drawing = true;
            window.onmouseup = window.ontouchend = () => drawing = false;
            canvas.onmousemove = canvas.ontouchmove = scratch;
        }
    </script>
</body>
</html>
